<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwinto Digital Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="title.png"/>
    <div class="setup-screen" id="setupScreen">
        <p style="font-size: 18px; font-weight: 500;">Choose your game format:</p>
        <button class="btn" onclick="startGame('PvP')">Human vs Human (Local)</button>
        <button class="btn" onclick="startGame('Ai')">Human vs AI</button>
    </div>

    <div class="transition-screen" id="transitionScreen" style="display:none;">
        <h2 id="transitionMessage">Pass the device to Player 2</h2>
        <button class="btn" onclick="revealNextTurn()">Ready to Play</button>
    </div>

    <div class="status-banner" id="statusBanner" style="display:none;">Select a Mode to Start Playing!</div>

    <div class="dice-panel" id="dicePanel" style="display:none;">
        <div>
            <span style="font-size: 13px; display:block; color:#777; margin-bottom:4px;">Click dice to toggle colors:</span>
            <div class="dice-container">
                <div class="die orange-die selected" data-color="orange" onclick="toggleDie(this)">O</div>
                <div class="die yellow-die selected" data-color="yellow" onclick="toggleDie(this)">Y</div>
                <div class="die purple-die selected" data-color="purple" onclick="toggleDie(this)">P</div>
            </div>
        </div>
        <button class="btn" id="rollBtn" onclick="rollDice()">Roll Dice</button>
        <div class="roll-result" id="rollResult">-</div>
        <button class="btn" id="passBtn" onclick="handlePassTurn()" style="background-color:#777; box-shadow: 0 4px #555;">Pass Turn</button>
    </div>

    <div class="game-area" id="gameArea"></div>
<script src="script.js"></script>
</body>
</html>
